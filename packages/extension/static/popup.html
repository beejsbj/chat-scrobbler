<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <div class="header-brand">
          <svg class="logo" viewBox="0 0 20 20" width="18" height="18" aria-hidden="true">
            <circle cx="10" cy="10" r="8" fill="none" stroke="currentColor" stroke-width="1.8"/>
            <circle cx="10" cy="10" r="2.8" fill="currentColor"/>
            <circle cx="10" cy="3.2" r="1.2" fill="currentColor" opacity="0.45"/>
            <circle cx="16.8" cy="10" r="1.2" fill="currentColor" opacity="0.45"/>
            <circle cx="3.2" cy="10" r="1.2" fill="currentColor" opacity="0.45"/>
          </svg>
          <span class="brand-name">scrobbler</span>
        </div>
        <label class="toggle" title="Auto-sync new chats when you open ChatGPT / Claude / Gemini">
          <input id="auto-sync" type="checkbox">
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
            <span class="toggle-label-on">on</span>
            <span class="toggle-label-off">off</span>
          </span>
        </label>
      </header>

      <section class="session-list-section">
        <details id="session-details">
          <summary>
            <span class="summary-label">captured this session</span>
            <span id="session-count-badge" class="count-badge">0</span>
          </summary>
          <ul id="session-list" class="session-list">
            <li class="session-empty">No captures yet this session.</li>
          </ul>
        </details>
      </section>

      <details class="receiver-details">
        <summary class="receiver-summary">
          <span>receiver</span>
          <span id="receiver-state" class="receiver-state"></span>
        </summary>
        <div class="receiver-body">
          <label class="field">
            <span class="field-label">Ingest URL</span>
            <input id="ingest-url" type="url" spellcheck="false" autocomplete="off">
          </label>
          <button id="sync-all" type="button">Sync open tabs now</button>
        </div>
      </details>
    </main>

    <footer>
      <span id="capture-count" class="stat">0 captured</span>
      <span id="last-capture" class="stat stat-right">never</span>
    </footer>

    <script type="module" src="dist/popup.js"></script>
  </body>
</html>
